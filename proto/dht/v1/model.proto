syntax = "proto3";
package dht.v1;

import "cosmos/base/v1beta1/coin.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/nesaorg/nesachain/x/dht/types";

// TokenPrice defines the price of a token
message TokenPrice {
  option (gogoproto.equal) = true;

  cosmos.base.v1beta1.Coin input_price = 1 [(gogoproto.nullable) = false];
  cosmos.base.v1beta1.Coin output_price = 2 [(gogoproto.nullable) = false];
}

// Model defines a model
message Model {
  string creator = 1;
  string model_name = 2;
  TokenPrice token_price = 4 [(gogoproto.nullable) = false];
  ModelSWindow s_window = 5;

  reserved 3;
}

// ModelConfig defines configuration parameters for a specific model
message ModelConfig {
  // Model name
  string model_name = 1;
  // Model size
  uint64 model_size = 2;
  // Rolling/EMA average execution time
  string avg_execution_time = 3 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false,
    (cosmos_proto.scalar) = "cosmos.Dec"
  ];
  // Model specific input coefficient (optional)
  string k1_override = 4 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = true,
    (cosmos_proto.scalar) = "cosmos.Dec"
  ];
  // Model specific output coefficient (optional)
  string k2_override = 5 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = true,
    (cosmos_proto.scalar)  = "cosmos.Dec"
  ];
}

// ModelSWindow maintains the last 100 S calculations for a model
message ModelSWindow {
  // S raw
  repeated string s_raw = 1 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
}
